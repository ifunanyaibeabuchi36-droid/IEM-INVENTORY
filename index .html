<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEM Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container" class="login-card">
        <h2>IEM Inventory</h2>
        <p>Sign in to manage your stock</p>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter password">
            </div>
            <div id="login-error" class="error-msg hidden">Invalid username or password.</div>
            <button type="submit" class="btn-primary full-width">Sign In</button>
        </form>
    </div>

    <div id="app-container" class="container hidden">
        <header>
            <div class="header-title">
                <h1>IEM Inventory</h1>
                <span class="badge">Live Stock System</span>
            </div>
            <button id="logout-btn" class="btn-logout">Logout</button>
        </header>

        <section class="dashboard-grid">
            <div class="card">
                <h3>Total Products</h3>
                <p id="stat-total-products">0</p>
            </div>
            <div class="card">
                <h3>Total Stock Items</h3>
                <p id="stat-total-stock">0</p>
            </div>
            <div class="card">
                <h3>Total Inventory Value</h3>
                <p id="stat-total-value">₦0.00</p>
            </div>
        </section>

        <div class="main-layout">
            <section class="form-section">
                <h2 id="form-title">Add New Product</h2>
                <form id="inventory-form">
                    <input type="hidden" id="edit-index">
                    <div class="form-group">
                        <label for="product-name">Product Name</label>
                        <input type="text" id="product-name" required placeholder="e.g., Wireless Mouse">
                    </div>
                    <div class="form-group">
                        <label for="ref-number">Reference Number</label>
                        <input type="text" id="ref-number" required placeholder="e.g., REF-1024">
                    </div>
                    <div class="form-group">
                        <label for="quantity">Quantity</label>
                        <input type="number" id="quantity" min="0" required placeholder="e.g., 50">
                    </div>
                    <div class="form-group">
                        <label for="price">Price (₦)</label>
                        <input type="number" id="price" min="0" step="0.01" required placeholder="e.g., 15000">
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="submit-btn" class="btn-primary">Add Product</button>
                        <button type="button" id="cancel-btn" class="btn-secondary hidden">Cancel Edit</button>
                    </div>
                </form>
            </section>

            <section class="table-section">
                <h2>Product Records</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>S/N</th>
                                <th>Product Name</th>
                                <th>Ref Number</th>
                                <th>Quantity</th>
                                <th>Price</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-tbody">
                            </tbody>
                    </table>
                </div>
                <div id="empty-state" class="empty-state">No products found in inventory.</div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
